<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>臺灣數位資產暨開放科技協會 (DAOTAT)｜首頁</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0A2540;
    --blue: #1E6BDD;
    --blue-dark: #1759BD;
    --blue-soft: #E8F0FC;
    --blue-border: #C9DBF5;
    --text: #0A2540;
    --text-muted: #5A6B82;
    --bg: #F7F9FC;
    --card: #FFFFFF;
    --line: #E3E8F0;
    --dark: #0E1A2B;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #E6ECF4;
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.6;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .container {
    flex: 1;
    max-width: 1000px;
    margin: 48px auto;
    width: 100%;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
  }

  .header {
    text-align: center;
    margin-bottom: 56px;
    position: relative;
  }

  .eyebrow {
    font-size: 14px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .main-title {
    font-family: "Noto Serif TC", serif;
    font-weight: 900;
    font-size: 44px;
    color: var(--navy);
    letter-spacing: 3px;
    line-height: 1.2;
    margin-bottom: 16px;
  }

  .subtitle {
    font-size: 18px;
    color: var(--text-muted);
    max-width: 600px;
    margin: 0 auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 32px;
  }

  .card {
    background: var(--card);
    border-radius: 6px;
    box-shadow: 0 16px 40px rgba(10, 37, 64, 0.08);
    overflow: hidden;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    border: 1px solid transparent;
  }

  .card:hover {
    transform: translateY(-8px);
    box-shadow: 0 24px 56px rgba(10, 37, 64, 0.12);
    border-color: var(--blue-border);
  }

  .card-img-wrap {
    height: 180px;
    background: var(--navy);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Different background gradients/patterns for cards */
  .card-img-wrap.course-img {
    background: linear-gradient(135deg, var(--navy) 0%, #1a3c61 100%);
  }
  .card-img-wrap.speaker-img {
    background: linear-gradient(135deg, var(--blue) 0%, #004fb5 100%);
  }

  .card-icon {
    width: 64px;
    height: 64px;
    color: rgba(255, 255, 255, 0.9);
  }

  .card-content {
    padding: 32px 28px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .card-tag {
    font-size: 12px;
    font-weight: 700;
    color: var(--blue);
    background: var(--blue-soft);
    padding: 4px 12px;
    border-radius: 4px;
    align-self: flex-start;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }

  .card-title {
    font-family: "Noto Serif TC", serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--navy);
    margin-bottom: 12px;
    line-height: 1.4;
  }

  .card-desc {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 24px;
    flex: 1;
  }

  .card-action {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 700;
    color: var(--blue);
    margin-top: auto;
  }

  .card-action svg {
    width: 18px;
    height: 18px;
    transition: transform 0.2s;
  }

  .card:hover .card-action svg {
    transform: translateX(4px);
  }

  .footer {
    text-align: center;
    padding: 32px 24px;
    margin-top: auto;
    font-size: 14px;
    color: var(--text-muted);
  }

  @media (max-width: 768px) {
    .main-title { font-size: 32px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

  <div class="container">
    <header class="header">
      <div class="eyebrow">DAOTAT</div>
      <h1 class="main-title">臺灣數位資產暨<br>開放科技協會</h1>
      <p class="subtitle">推動數位資產與開放科技的發展與落地，連結產業、政府與大眾，打造共榮生態圈。</p>
    </header>

    <div class="grid">
      <!-- 課程卡片 -->
      <a href="./course/" class="card">
        <div class="card-img-wrap course-img">
          <!-- 課程 icon -->
          <svg class="card-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="8" y="16" width="48" height="36" rx="3"/>
            <path d="M8 24 H44 a4 4 0 0 1 0 8 H8"/>
            <circle cx="48" cy="28" r="2" fill="currentColor" stroke="none"/>
            <path d="M14 16 L42 8 L46 16"/>
          </svg>
        </div>
        <div class="card-content">
          <span class="card-tag">課程活動</span>
          <h2 class="card-title">加密貨幣入門與動手實作</h2>
          <p class="card-desc">聽過很多，但你真的做過嗎？三小時親手走一遍。透過實作認識錢包支付與 DeFi 應用，零門檻無痛入門。</p>
          <div class="card-action">
            查看課程詳情
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </div>
        </div>
      </a>

      <!-- 講者介紹卡片 -->
      <a href="./speaker/" class="card">
        <div class="card-img-wrap speaker-img">
          <!-- 講者 icon -->
          <svg class="card-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="32" cy="24" r="10"/>
            <path d="M14 52 c0 -12 8 -20 18 -20 s18 8 18 20"/>
          </svg>
        </div>
        <div class="card-content">
          <span class="card-tag">講師陣容</span>
          <h2 class="card-title">許明恩・講師介紹</h2>
          <p class="card-desc">區塊勢創辦人、獨立內容創作者。用真實案例解讀區塊鏈產業，擁有超過八年的寫作與訪談經驗。</p>
          <div class="card-action">
            認識講師
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </div>
        </div>
      </a>
    </div>
  </div>

  <footer class="footer">
    © 2026 臺灣數位資產暨開放科技協會 (DAOTAT). All rights reserved.
  </footer>

</body>
</html>
